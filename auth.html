<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PaperStreet - Login / Register</title>
</head>
<body>
  <h1>PaperStreet</h1>
  <nav>
    <a href="index.html">Home</a> |
    <a href="auth.html">Login / Register</a> |
    <a href="dashboard.html">Dashboard</a> |
    <a href="search.html">Stock Search</a> |
    <a href="portfolio.html">Portfolio</a>
  </nav>
  <hr>

  <h2>Log In</h2>
  <form onsubmit="handleLogin(event)">
    <label for="login-identifier">Username or Email:</label><br>
    <input type="text" id="login-identifier" name="identifier"><br><br>
    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password"><br><br>
    <input type="submit" value="Log In">
  </form>

  <hr>

  <h2>Create an Account</h2>
  <form onsubmit="handleRegister(event)">
    <label for="username">Username:</label><br>
    <input type="text" id="username" name="username"><br><br>
    <label for="reg-email">Email:</label><br>
    <input type="text" id="reg-email" name="email"><br><br>
    <label for="reg-password">Password:</label><br>
    <input type="password" id="reg-password" name="password"><br><br>
    <input type="submit" value="Create Account">
  </form>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      var identifier = document.getElementById('login-identifier').value.trim();
      var password = document.getElementById('password').value.trim();

      if (!identifier) {
        alert('Please enter your username or email.');
        return;
      }
      if (!password) {
        alert('Please enter your password.');
        return;
      }

      alert(
        '[IN PROGRESS]\n\n' +
        'MySQL query:\n' +
        'SELECT * FROM users WHERE (username = "' + identifier + '" OR email = "' + identifier + '") AND password = [hashed input]\n\n' +
        'If a matching row is found:\n' +
        '  - Session is created for that user\n' +
        '  - User is redirected to Dashboard\n\n' +
        'If no matching row is found:\n' +
        '  - Login is rejected\n\n' +
        '---\n' +
        'For now: this would check your credentials against MySQL and start a session. Until the database is connected, it skips the check and just opens the Dashboard as the sample user "User".'
      );
      window.location.href = 'dashboard.html';
    }

    function handleRegister(e) {
      e.preventDefault();
      var username = document.getElementById('username').value.trim();
      var email = document.getElementById('reg-email').value.trim();
      var password = document.getElementById('reg-password').value.trim();

      if (!username) {
        alert('Please enter a username.');
        return;
      }
      if (!email || email.indexOf('@') === -1) {
        alert('Please enter a valid email address.');
        return;
      }
      if (!password) {
        alert('Please enter a password.');
        return;
      }

      alert(
        '[IN PROGRESS]\n\n' +
        'MySQL queries:\n' +
        '1. INSERT INTO users (username, email, password) VALUES ("' + username + '", "' + email + '", [hashed password])\n' +
        '2. INSERT INTO accounts (user_id, balance) VALUES ([new user id], 10000.00)\n\n' +
        'If username or email already exists:\n' +
        '  - Registration is rejected\n\n' +
        'On success:\n' +
        '  - The account is created with a $10,000 starting balance\n' +
        '  - User is asked to log in with their new account\n\n' +
        '---\n' +
        'For now: this would create your account in MySQL with a $10,000 balance. Your account has been created. Please log in with your new account.'
      );
    }
  </script>
</body>
</html>
